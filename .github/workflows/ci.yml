name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Syntax & Repo Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate Python syntax
        run: |
          python -m py_compile \
            main.py \
            backend/__main__.py \
            backend/application.py \
            backend/api/backend_bridge.py \
            backend/infra/system_monitor_psutil.py \
            backend/engines/scancenter/scanner_orchestrator.py \
            backend/utils/diagnostics.py

      - name: Validate repository layout
        run: |
          test -f frontend/qml/main.qml
          test -f frontend/qml/components/Theme.qml
          test -f frontend/qml/pages/ScanCenter.qml
          test -f frontend/qml/pages/AiReport.qml

  test:
    name: Test on Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile main.py
          python -m py_compile backend/application.py
          python -m py_compile backend/__main__.py
          python -m py_compile backend/api/backend_bridge.py
          python -m py_compile backend/infra/system_monitor_psutil.py
          python -m py_compile backend/engines/scancenter/scanner_orchestrator.py
          python -m py_compile backend/utils/diagnostics.py

      - name: Check QML files exist
        shell: powershell
        run: |
          if (!(Test-Path "frontend/qml/main.qml")) { throw "frontend/qml/main.qml not found" }
          if (!(Test-Path "frontend/qml/components/Theme.qml")) { throw "frontend/qml/components/Theme.qml not found" }
          if (!(Test-Path "frontend/qml/pages/ScanCenter.qml")) { throw "frontend/qml/pages/ScanCenter.qml not found" }
          if (!(Test-Path "frontend/qml/pages/AiReport.qml")) { throw "frontend/qml/pages/AiReport.qml not found" }

      - name: Run diagnostics
        env:
          SKIP_UAC: "1"
        run: |
          python -m backend --diagnose
